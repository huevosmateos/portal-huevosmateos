<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Autorización de cliente</title>
<style>
  body{font-family:Arial,sans-serif;background:#f4f4f7;margin:0;padding:40px 20px;display:flex;justify-content:center}
  .box{background:#fff;border-radius:12px;padding:36px 32px;max-width:440px;width:100%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.08)}
  h2{margin:0 0 12px}
  p{color:#555;font-size:15px;line-height:1.5}
  .btn{display:inline-block;background:#0d0190;color:#fff;padding:13px 28px;border-radius:8px;text-decoration:none;font-weight:bold;margin-top:16px;border:none;cursor:pointer;font-size:15px;font-family:Arial,sans-serif}
</style></head>
<body>
<div class="box" id="box">Cargando...</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const BASE_URL = "https://pkwttturncewwdlpxrxz.supabase.co/functions/v1/autorizar-cliente";
const sb = supabase.createClient(
  "https://pkwttturncewwdlpxrxz.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrd3R0dHVybmNld3dkbHB4cnh6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNTQ1OTEsImV4cCI6MjA5NTczMDU5MX0.aFKZbuO-0zO--SckT-FnjkGdOAV5nBWeEoLgMcV80VY"
);
const params = new URLSearchParams(window.location.search);
const status = params.get("status");
const box = document.getElementById("box");

function render(titulo, color, mensaje, boton) {
  box.innerHTML = `<h2 style="color:${color}">${titulo}</h2><p>${mensaje}</p>${boton || ""}`;
}

function cerrarVentana() {
  window.close();
  setTimeout(function() {
    if (!window.closed) {
      history.back();
    }
  }, 200);
}

var hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
var accessToken = hashParams.get('access_token');
var refreshToken = hashParams.get('refresh_token');

if (accessToken && refreshToken) {
  render("Iniciando sesión...", "#0d0190", "Un momento, te llevamos al portal.");
  sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken }).then(function(res){
    if (res.error) {
      render("Cuenta verificada", "#1a7a4a",
        "Tu cuenta ya está activa, pero no se pudo iniciar sesión automáticamente. Entra manualmente.",
        '<a href="https://huevosmateos.github.io/portal-huevosmateos/tienda.html" class="btn">Ir al portal</a>');
    } else {
      window.location.replace('https://huevosmateos.github.io/portal-huevosmateos/tiendaconprecio.html');
    }
  });
} else if (status === "confirmar") {
  const token = params.get("token");
  const codigo = params.get("codigo");
  const email = params.get("email");
  const urlSi = `${BASE_URL}?token=${encodeURIComponent(token)}&accion=autorizar`;
  render("Confirmar autorización", "#0d0190",
    `¿Confirmas que quieres autorizar el acceso al cliente con código <strong>${codigo}</strong> (${email}) al portal B2B?`,
    `<a href="${urlSi}" class="btn">Sí, autorizar</a>`);
} else if (status === "ok") {
  render("Cliente autorizado", "#1a7a4a",
    `El cliente <strong>${params.get("codigo")}</strong> ya puede acceder al portal. Se le ha enviado un email para que cree su contraseña.`,
    `<button onclick="cerrarVentana()" class="btn">Aceptar</button>`);
} else if (status === "alta_ok") {
  render("Cuenta verificada", "#1a7a4a",
    `Tu email ha sido verificado y tu cuenta ya está activa. Ya puedes acceder al portal con tu email y tu contraseña.`,
    `<a href="https://huevosmateos.github.io/portal-huevosmateos/tienda.html" class="btn">Ir al portal</a>`);
} else if (status === "usado") {
  render("Ya procesado", "#888", "Este cliente ya fue autorizado anteriormente con este enlace.");
} else if (status === "caducado") {
  render("Enlace caducado", "#c0392b", "Este enlace de autorización caducó (válido 3 días). Pide al cliente que vuelva a intentar entrar para generar uno nuevo.");
} else if (status === "error") {
  render("Error", "#c0392b", "No se pudo autorizar al cliente: " + (params.get("msg") || ""));
} else {
  render("Enlace no válido", "#c0392b", "Este enlace de autorización no existe o ya fue procesado.");
}
</script>
</body></html>
